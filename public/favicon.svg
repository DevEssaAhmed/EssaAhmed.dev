<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- inky background -->
  <rect x="0" y="0" width="512" height="512" fill="#0b0f19"/>
  <!-- rounded card -->
  <rect x="32" y="32" width="448" height="448" rx="92" fill="#0c101c"/>
  <!-- E monogram (geometric bars) -->
  <g filter="url(#soft)" fill="url(#g)">
    <rect x="96" y="96" width="96" height="320" rx="36"/>
    <rect x="96" y="96" width="320" height="96" rx="36"/>
    <rect x="96" y="208" width="256" height="96" rx="36"/>
    <rect x="96" y="320" width="320" height="96" rx="36"/>
  </g>
</svg>
